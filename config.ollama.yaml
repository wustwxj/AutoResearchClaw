project:
  name: "my-research"
  mode: "full-auto"

research:
  topic: "Your research topic here"
  domains:
    - "machine-learning"
  daily_paper_count: 10
  quality_threshold: 4.0

runtime:
  timezone: "Asia/Shanghai"
  max_parallel_tasks: 3
  approval_timeout_hours: 12
  retry_limit: 2

notifications:
  channel: "console"
  target: ""
  on_stage_start: true
  on_stage_fail: true
  on_gate_required: true

knowledge_base:
  backend: "markdown"
  root: "docs/kb"

openclaw_bridge:
  use_cron: false
  use_message: false
  use_memory: false
  use_sessions_spawn: false
  use_web_fetch: false
  use_browser: false

# ======== OLLAMA 本地大模型配置 ========
llm:
  provider: "openai-compatible"
  base_url: "http://localhost:11434/v1"
  api_key: "ollama"  # Ollama 不需要真实 key
  api_key_env: ""    # 不使用环境变量
  primary_model: "qwen3:latest"
  fallback_models:
    - "llama3.1:8b"
    - "deepseek-r1:8b"

security:
  hitl_required_stages: [5, 9, 20]
  allow_publish_without_approval: false
  redact_sensitive_logs: true

experiment:
  mode: "sandbox"
  time_budget_sec: 300
  max_iterations: 10
  metric_key: "primary_metric"
  metric_direction: "minimize"
  sandbox:
    python_path: "python"
    gpu_required: false
    max_memory_mb: 4096

  figure_agent:
    enabled: false

prompts:
  custom_file: ""

metaclaw_bridge:
  enabled: false
